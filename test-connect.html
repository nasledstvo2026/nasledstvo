<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Connect — VPS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e14; color: #e6edf3; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 40px; max-width: 500px; width: 90%; text-align: center; }
  h1 { font-size: 22px; margin-bottom: 20px; color: #58a6ff; }
  .btn { display: inline-block; padding: 14px 36px; background: #238636; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 0; }
  .btn:hover { background: #2ea043; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .result { margin-top: 20px; padding: 16px; background: #0d1117; border-radius: 8px; text-align: left; font-family: 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; min-height: 60px; }
  .success { border-left: 4px solid #3fb950; }
  .error { border-left: 4px solid #f85149; }
  .info { color: #8b949e; font-size: 14px; margin-top: 16px; }
  code { color: #f0883e; }
</style>
</head>
<body>
<div class="card">
  <h1>🔌 Тест связи с VPS</h1>
  <p style="color:#8b949e; margin-bottom:16px;">Проверка доступности <code>http://176.123.162.12:8768</code></p>
  <button class="btn" id="testBtn" onclick="testConnection()">Проверить связь</button>
  <div class="result" id="result">Нажми кнопку, чтобы проверить...</div>
  <div class="info" id="extra"></div>
</div>

<script>
async function testConnection() {
  const btn = document.getElementById('testBtn');
  const result = document.getElementById('result');
  const extra = document.getElementById('extra');
  
  btn.disabled = true;
  btn.textContent = 'Проверяю...';
  result.className = 'result';
  result.textContent = 'Отправляю запрос...';
  extra.textContent = '';
  
  const start = Date.now();
  
  // Попробуем сначала GET
  try {
    const resp = await fetch('http://176.123.162.12:8768/ping', { 
      method: 'GET',
      mode: 'cors',
      cache: 'no-cache'
    });
    const elapsed = Date.now() - start;
    const data = await resp.json();
    
    result.className = 'result success';
    result.textContent = `✅ УСПЕХ (${elapsed}ms)\n\nСтатус: ${resp.status}\nОтвет: ${JSON.stringify(data, null, 2)}`;
    extra.innerHTML = `IP <code>176.123.162.12:8768</code> доступен из этой сети`;
  } catch (err) {
    const elapsed = Date.now() - start;
    result.className = 'result error';
    result.textContent = `❌ ОШИБКА (${elapsed}ms)\n\n${err.message || err}`;
    extra.innerHTML = `IP <code>176.123.162.12:8768</code> <b style="color:#f85149;">НЕ ДОСТУПЕН</b> из этой сети<br><br>Возможные причины:
• Блокировка порта 8768 корпоративным файрволом
• Блокировка прямых HTTP-запросов на внешние IP
• Требуется HTTPS (попробуем через Cloudflare?)`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Проверить ещё раз';
  }
}
</script>
</body>
</html>
