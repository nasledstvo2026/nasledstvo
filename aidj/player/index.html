<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI DJ — Плеер</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e14;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .player-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo h1 {
      font-size: 1.6em;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff, #bc8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p {
      color: #8b949e;
      font-size: 0.85em;
      margin-top: 4px;
    }
    .track-list {
      margin: 20px 0;
    }
    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #21262d;
      font-size: 0.9em;
    }
    .track-item:last-child { border-bottom: none; }
    .track-num {
      width: 24px;
      height: 24px;
      background: #1f2937;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75em;
      font-weight: 600;
      color: #58a6ff;
      flex-shrink: 0;
    }
    .track-name {
      flex: 1;
      color: #c9d1d9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-bpm {
      color: #8b949e;
      font-size: 0.85em;
      font-family: monospace;
    }
    .bpm-badge {
      background: rgba(88,166,255,0.15);
      color: #58a6ff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.8em;
      font-weight: 600;
    }
    audio {
      width: 100%;
      margin: 16px 0;
      border-radius: 8px;
    }
    audio::-webkit-media-controls-panel {
      background: #1f2937;
    }
    .mix-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85em;
      color: #8b949e;
      padding: 8px 0;
    }
    .mix-info span { font-family: monospace; }
    .status-message {
      text-align: center;
      padding: 40px 20px;
      color: #8b949e;
    }
    .status-message .icon { font-size: 3em; margin-bottom: 16px; }
    .status-message h2 { color: #f0f6fc; font-size: 1.2em; margin-bottom: 8px; }
    .status-message p { font-size: 0.9em; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.9em;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-top: 16px;
    }
    .btn:hover { background: linear-gradient(135deg, #2ea043, #3fb950); }
    .btn-main {
      display: block;
      text-align: center;
      margin-top: 20px;
      padding: 12px;
      background: #1f2937;
      color: #c9d1d9;
      border-radius: 12px;
      text-decoration: none;
      font-size: 0.9em;
      transition: background 0.2s;
    }
    .btn-main:hover { background: #30363d; }
    @media (max-width: 480px) {
      .player-card { padding: 20px; border-radius: 16px; }
      .logo h1 { font-size: 1.3em; }
    }
  </style>
</head>
<body>
<div class="player-card">
  <div class="logo">
    <h1>🎧 AI DJ</h1>
    <p>Сведение треков онлайн</p>
  </div>

  <div id="mix-content">
    <div class="status-message" id="no-mix">
      <div class="icon">⏳</div>
      <h2>Микс ещё не готов</h2>
      <p>Отправь треки через Telegram-бота командой <strong>/dj</strong>.<br>После сведения здесь появится плеер.</p>
      <a class="btn-main" href="https://t.me/Kirill_syst" target="_blank">Открыть Telegram</a>
    </div>
  </div>
</div>

<script>
// Load mix data from JSON
fetch('../mix-current.json')
  .then(r => {
    if (!r.ok) throw new Error('No mix');
    return r.json();
  })
  .then(data => {
    renderMix(data);
  })
  .catch(() => {
    // Keep showing "no mix" state, but poll
    setTimeout(() => location.reload(), 10000);
  });

function renderMix(data) {
  const container = document.getElementById('mix-content');

  // Track list
  let tracksHtml = '';
  if (data.tracks && data.tracks.length) {
    tracksHtml = '<div class="track-list">';
    data.tracks.forEach((t, i) => {
      tracksHtml += `
        <div class="track-item">
          <div class="track-num">${i + 1}</div>
          <div class="track-name">${t.name || 'Track ' + (i+1)}</div>
          <div class="track-bpm"><span class="bpm-badge">${t.bpm || '?'} BPM</span></div>
        </div>
      `;
    });
    tracksHtml += '</div>';
  }

  // Audio player
  const audioUrl = data.url || '';
  const duration = data.duration ? `${data.duration}s` : '—';

  container.innerHTML = `
    ${tracksHtml}
    <div class="mix-info">
      <span>${data.tracks ? data.tracks.length : 0} треков</span>
      <span>${duration}</span>
      <span>${data.total_bpm ? data.total_bpm + ' BPM' : ''}</span>
    </div>
    <audio controls autoplay src="${audioUrl}"></audio>
    <a class="btn-main" href="${audioUrl}" download>Скачать микс</a>
  `;
}
</script>
</body>
</html>
