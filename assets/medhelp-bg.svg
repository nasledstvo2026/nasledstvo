<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2816;stop-opacity:1"/>
    </linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="#3fb950" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="600" height="400" fill="url(#g)"/>
  <rect width="600" height="400" fill="url(#dots)"/>
  <text x="300" y="180" text-anchor="middle" font-family="serif" font-size="60" fill="#3fb950" opacity="0.2">📋</text>
  <text x="300" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3fb950" opacity="0.08">MEDHELP</text>
</svg>
