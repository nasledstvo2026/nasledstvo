name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Remove broken symlinks
        run: |
          rm -f mamkin-analitik/_bmad/core mamkin-analitik/_bmad/bmm
      - name: Prepare artifact (copy with excludes)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='aidj/fantazia-tracks' \
            --exclude='aidj/static' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='*.flac' \
            --exclude='*.wav' \
            --exclude='*.mp3' \
            --exclude='*.m4a' \
            --exclude='*.aiff' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            . _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
