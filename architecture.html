  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const now=new Date();
  document.getElementById('ud').textContent=now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
</script>
</body>
