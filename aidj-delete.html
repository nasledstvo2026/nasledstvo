<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DJ — удаление треков</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg-deep: #070b12;
      --bg-card: rgba(14, 22, 36, 0.75);
      --border-subtle: rgba(0, 200, 255, 0.08);
      --border-glow: rgba(0, 200, 255, 0.25);
      --cyan: #00d4ff;
      --cyan-dim: rgba(0, 212, 255, 0.15);
      --magenta: #f0f;
      --purple: #a855f7;
      --purple-dim: rgba(168, 85, 247, 0.15);
      --pink: #ff3bc3;
      --red: #ff4757;
      --red-dim: rgba(255, 71, 87, 0.15);
      --text: #eaf0f6;
      --text-dim: #8892a0;
      --text-faint: #4a5464;
      --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
      --glow-red: 0 0 20px rgba(255, 71, 87, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ─── Animated Background ─── */
    .bg-grid {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    .bg-glow {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .bg-glow::before {
      content: ''; position: absolute; top: -30%; left: -10%; width: 60%; height: 80%;
      background: radial-gradient(ellipse, rgba(255, 71, 87, 0.06), transparent 60%);
      animation: glow-drift 12s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: ''; position: absolute; bottom: -20%; right: -10%; width: 60%; height: 80%;
      background: radial-gradient(ellipse, rgba(168, 85, 247, 0.05), transparent 60%);
      animation: glow-drift 12s ease-in-out infinite alternate-reverse;
    }

    @keyframes glow-drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 5%) scale(1.1); }
    }

    /* ─── Particles ─── */
    .particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1; overflow: hidden;
    }
    .particle {
      position: absolute; width: 3px; height: 3px;
      background: var(--red); border-radius: 50%; opacity: 0;
      animation: particle-float 8s infinite; box-shadow: 0 0 6px var(--red);
    }
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 25%; animation-delay: 1.2s; width: 2px; height: 2px; }
    .particle:nth-child(3) { left: 40%; animation-delay: 2.5s; background: var(--purple); box-shadow: 0 0 6px var(--purple); }
    .particle:nth-child(4) { left: 55%; animation-delay: 0.8s; width: 4px; height: 4px; }
    .particle:nth-child(5) { left: 70%; animation-delay: 3.1s; background: var(--magenta); box-shadow: 0 0 6px var(--magenta); }
    .particle:nth-child(6) { left: 85%; animation-delay: 1.8s; width: 2px; height: 2px; }
    .particle:nth-child(7) { left: 50%; animation-delay: 4.2s; background: var(--purple); }
    .particle:nth-child(8) { left: 15%; animation-delay: 5.0s; }
    .particle:nth-child(9) { left: 65%; animation-delay: 3.8s; }
    .particle:nth-child(10) { left: 35%; animation-delay: 6.0s; background: var(--magenta); }

    @keyframes particle-float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ─── Layout ─── */
    .container {
      position: relative; z-index: 2;
      max-width: 860px; margin: 0 auto; padding: 24px 24px 48px;
    }

    /* ─── Back ─── */
    .back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-dim); font-size: 13px; font-weight: 500;
      margin-bottom: 24px; padding: 8px 18px; border-radius: 10px;
      background: var(--bg-card); backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      border: 1px solid var(--border-subtle);
      transition: all 0.3s ease; text-decoration: none;
      position: relative; overflow: hidden;
    }
    .back::before {
      content: ''; position: absolute; inset: -1px; border-radius: 10px;
      background: linear-gradient(135deg, var(--red), transparent, var(--purple));
      opacity: 0; transition: opacity 0.3s ease; z-index: -1;
    }
    .back:hover {
      color: var(--text); border-color: transparent;
      box-shadow: var(--glow-red); transform: translateX(-2px);
    }
    .back:hover::before { opacity: 1; }

    /* ─── Hero ─── */
    .hero {
      text-align: center; padding: 28px 24px 24px; position: relative;
    }
    .hero::after {
      content: ''; position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%); width: 120px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), var(--purple), transparent);
      border-radius: 2px;
    }

    .hero .title {
      font-size: 28px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #ff6b81, var(--red), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 4px;
    }

    .hero .subtitle {
      font-size: 13px; color: var(--text-dim); font-weight: 400;
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px;
    }

    .hero .meta {
      font-size: 13px; color: var(--text-faint); margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── Track List ─── */
    .track-list {
      margin-top: 28px;
    }

    .track-item {
      display: flex; align-items: center; gap: 16px;
      background: var(--bg-card);
      backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      border: 1px solid var(--border-subtle);
      border-radius: 14px; padding: 14px 18px;
      margin-bottom: 10px;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    .track-item::before {
      content: ''; position: absolute; inset: 0; border-radius: 14px; padding: 1px;
      background: linear-gradient(135deg, transparent, rgba(255, 71, 87, 0.06), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .track-item:hover {
      border-color: transparent;
      box-shadow: var(--glow-red);
    }
    .track-item:hover::before { opacity: 1; }
    .track-item.disabled {
      opacity: 0.5; pointer-events: none;
    }

    /* Checkbox */
    .track-item .check-wrap {
      flex-shrink: 0;
    }
    .track-item input[type="checkbox"] {
      width: 22px; height: 22px; cursor: pointer; accent-color: var(--red);
      border-radius: 4px; background: transparent;
      transition: transform 0.15s;
    }
    .track-item input[type="checkbox"]:checked {
      transform: scale(1.1);
    }

    .track-item .track-info {
      flex: 1; min-width: 0;
    }
    .track-item .track-title {
      font-size: 1em; font-weight: 600; color: var(--text);
      margin-bottom: 2px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-item .track-artist {
      font-size: 0.85em; color: var(--text-dim);
    }
    .track-item .track-duration {
      font-size: 0.78em; color: var(--text-faint);
      font-family: 'JetBrains Mono', monospace; flex-shrink: 0;
    }

    /* ─── Bottom Bar ─── */
    .bottom-bar {
      position: sticky; bottom: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center; gap: 20px;
      padding: 16px 24px;
      background: rgba(7, 11, 18, 0.9);
      backdrop-filter: blur(20px) saturate(2);
      -webkit-backdrop-filter: blur(20px) saturate(2);
      border-top: 1px solid var(--border-subtle);
      margin-top: 20px; border-radius: 14px;
    }

    .bottom-bar .cnt {
      color: var(--text-dim); font-size: 0.9em;
      font-family: 'JetBrains Mono', monospace;
    }
    .bottom-bar .cnt strong { color: var(--text); }

    .btn-delete {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--red), #ff6b81);
      border: none; border-radius: 10px;
      color: #fff; font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 0.95em; cursor: pointer;
      transition: all 0.2s ease; position: relative;
    }
    .btn-delete:hover:not(:disabled) {
      box-shadow: 0 0 30px rgba(255, 71, 87, 0.4);
      transform: scale(1.03);
    }
    .btn-delete:active:not(:disabled) { transform: scale(0.97); }
    .btn-delete:disabled {
      opacity: 0.4; cursor: not-allowed;
    }

    /* ─── Status / Alert ─── */
    .alert {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      z-index: 100;
      padding: 14px 28px; border-radius: 12px;
      background: var(--bg-card); backdrop-filter: blur(20px) saturate(2);
      border: 1px solid var(--border-subtle);
      font-size: 0.95em; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s ease, transform 0.3s ease;
      text-align: center; max-width: 500px;
    }
    .alert.show {
      opacity: 1; pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }
    .alert.error {
      border-color: var(--red); box-shadow: var(--glow-red);
    }
    .alert.success {
      border-color: #3fb950; box-shadow: 0 0 20px rgba(63, 185, 80, 0.3);
    }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center; padding: 60px 24px;
      color: var(--text-faint);
    }
    .empty-state .empty-icon {
      font-size: 48px; margin-bottom: 16px; opacity: 0.5;
    }
    .empty-state p {
      font-size: 1em; color: var(--text-dim);
    }

    /* ─── Select all ─── */
    .select-all-wrap {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 4px 8px; border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 16px;
    }
    .select-all-wrap input[type="checkbox"] {
      width: 22px; height: 22px; cursor: pointer; accent-color: var(--red);
    }
    .select-all-wrap label {
      font-size: 0.85em; color: var(--text-dim); cursor: pointer;
      font-weight: 500;
    }

    /* ─── Loading ─── */
    .loading {
      text-align: center; padding: 60px 24px;
      color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
    }
    .loading .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--border-subtle);
      border-top-color: var(--cyan); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .container { padding: 16px; }
      .hero { padding: 16px; }
      .hero .title { font-size: 22px; }
      .bottom-bar { flex-direction: column; gap: 12px; border-radius: 0; }
      .btn-delete { width: 100%; justify-content: center; }
      .track-item { padding: 12px 14px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Alert -->
  <div class="alert" id="alert"></div>

  <div class="container">

    <a class="back" href="aidj.html">← Назад к AI DJ</a>

    <div class="hero">
      <div class="subtitle">AI DJ</div>
      <div class="title">Удаление треков</div>
      <div class="meta">Отметьте треки для удаления из коллекции</div>
    </div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Загрузка коллекции...</p>
    </div>

    <div id="content" style="display:none;">
      <div id="selectAllRow" class="select-all-wrap">
        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
        <label for="selectAll">Выбрать все</label>
        <span id="selectedCount" style="margin-left:auto;color:var(--text-faint);font-family:'JetBrains Mono',monospace;font-size:0.85em;">0 выбрано</span>
      </div>

      <div id="trackList" class="track-list"></div>

      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-icon">📂</div>
        <p>В коллекции пока нет треков</p>
      </div>
    </div>

  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar" id="bottomBar" style="display:none;">
    <span class="cnt">Выбрано: <strong id="cntSelected">0</strong> из <strong id="cntTotal">0</strong></span>
    <button class="btn-delete" id="btnDelete" onclick="confirmDelete()">
      Удалить выбранные
    </button>
  </div>

  <script>
    let tracks = [];

    async function loadTracks() {
      try {
        // Try API first
        const resp = await fetch('/aidj/tracks.json');
        if (!resp.ok) throw new Error('API unavailable');
        tracks = await resp.json();
      } catch(e) {
        // Fallback: direct JSON
        try {
          const resp = await fetch('aidj/tracks.json');
          tracks = await resp.json();
        } catch(e2) {
          showAlert('Не удалось загрузить коллекцию треков', 'error');
          return;
        }
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      if (!tracks.length) {
        document.getElementById('trackList').innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
        document.getElementById('bottomBar').style.display = 'none';
        return;
      }

      document.getElementById('bottomBar').style.display = 'flex';
      renderTracks();
    }

    function renderTracks() {
      const list = document.getElementById('trackList');
      const total = document.getElementById('cntTotal');

      list.innerHTML = tracks.map((t, i) => {
        const dur = t.duration || '';
        const title = t.title || 'Без названия';
        const artist = t.artist || '';
        return `
          <div class="track-item" id="track-${i}">
            <div class="check-wrap">
              <input type="checkbox" id="cb-${i}" data-index="${i}" onchange="updateCount()">
            </div>
            <div class="track-info">
              <div class="track-title">${escHtml(title)}</div>
              ${artist ? `<div class="track-artist">${escHtml(artist)}</div>` : ''}
            </div>
            ${dur ? `<div class="track-duration">${dur}</div>` : ''}
          </div>
        `;
      }).join('');

      total.textContent = tracks.length;
      updateCount();
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function toggleSelectAll() {
      const checked = document.getElementById('selectAll').checked;
      document.querySelectorAll('#trackList input[type="checkbox"]').forEach(cb => {
        cb.checked = checked;
      });
      updateCount();
    }

    function updateCount() {
      const checkboxes = document.querySelectorAll('#trackList input[type="checkbox"]');
      const checked = Array.from(checkboxes).filter(cb => cb.checked);
      const cnt = checked.length;
      document.getElementById('selectedCount').textContent = cnt + ' выбрано';
      document.getElementById('cntSelected').textContent = cnt;

      // Update select all
      document.getElementById('selectAll').checked =
        checkboxes.length > 0 && checked.length === checkboxes.length;
    }

    async function confirmDelete() {
      const checkboxes = document.querySelectorAll('#trackList input[type="checkbox"]:checked');
      if (!checkboxes.length) {
        showAlert('Выберите хотя бы один трек для удаления', 'error');
        return;
      }

      const indices = Array.from(checkboxes).map(cb => parseInt(cb.dataset.index));
      const urls = indices.map(i => tracks[i].url);

      if (!confirm(`Удалить ${urls.length} трек(ов) из коллекции? Файлы будут безвозвратно удалены.`)) {
        return;
      }

      const btn = document.getElementById('btnDelete');
      btn.disabled = true;
      btn.textContent = 'Удаление...';

      try {
        const resp = await fetch('/aidj/api/tracks/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ urls })
        });

        const result = await resp.json();

        if (result.ok) {
          showAlert(result.message || 'Треки удалены', 'success');

          // Remove from local list
          const indicesToRemove = new Set(indices);
          tracks = tracks.filter((_, i) => !indicesToRemove.has(i));
          renderTracks();

          document.getElementById('selectAll').checked = false;
          updateCount();

          if (!tracks.length) {
            document.getElementById('trackList').innerHTML = '';
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('bottomBar').style.display = 'none';
          }
        } else {
          showAlert(result.error || 'Ошибка удаления', 'error');
        }
      } catch(e) {
        showAlert('Ошибка соединения с сервером: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Удалить выбранные';
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + (type || '') + ' show';
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // Init
    loadTracks();
  </script>
</body>
</html>
