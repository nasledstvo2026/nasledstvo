use_default_settings: true

general:
  instance_name: "OpenClaw SearXNG"
  debug: false

server:
  secret_key: "dd8d633ba7c00e76127ecf067a7af03915f0c0380e03277c865d39564b9719c5"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false
  method: "GET"

search:
  safe_search: 0
  formats:
    - html
    - json

ui:
  static_use_hash: true
  default_locale: "ru"

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
  # Firefox-подобный User-Agent — по умолчанию SearXNG шлёт "SearXNG/{version}",
  # что блокируется некоторыми движками (Brave, Google)
  useragent_suffix: "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:135.0) Gecko/20100101 Firefox/135.0"

engines:
  # Google — не отвечает с VPS
  - name: google
    engine: google
    shortcut: g
    disabled: true

  # DuckDuckGo
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  # Bing — работает стабильно
  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  # Startpage — капча с РФ IP
  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: true

  # Google News — не работает с VPS
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: true

  # Brave — 429 from VPS IP, отключаем
  - name: brave
    engine: brave
    shortcut: br
    disabled: true

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: true
