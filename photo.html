<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Фото — AI DJ Style</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg-deep: #070b12;
      --bg-card: rgba(14, 22, 36, 0.75);
      --border-subtle: rgba(0, 200, 255, 0.08);
      --border-glow: rgba(0, 200, 255, 0.25);
      --cyan: #00d4ff;
      --cyan-dim: rgba(0, 212, 255, 0.15);
      --magenta: #f0f;
      --purple: #a855f7;
      --purple-dim: rgba(168, 85, 247, 0.15);
      --pink: #ff3bc3;
      --text: #eaf0f6;
      --text-dim: #8892a0;
      --text-faint: #4a5464;
      --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
      --glow-magenta: 0 0 20px rgba(255, 0, 255, 0.3);
      --glow-purple: 0 0 20px rgba(168, 85, 247, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .bg-grid {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 80px 80px;
    }

    .bg-glow {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -10%;
      width: 60%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(0, 212, 255, 0.06), transparent 60%);
      animation: glow-drift 12s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 60%;
      height: 80%;
      background: radial-gradient(ellipse, rgba(168, 85, 247, 0.05), transparent 60%);
      animation: glow-drift 12s ease-in-out infinite alternate-reverse;
    }

    @keyframes glow-drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 5%) scale(1.1); }
    }

    .particles {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--cyan);
      border-radius: 50%;
      opacity: 0;
      animation: particle-float 8s infinite;
      box-shadow: 0 0 6px var(--cyan);
    }
    .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 7s; }
    .particle:nth-child(2) { left: 25%; animation-delay: 1.2s; animation-duration: 9s; width: 2px; height: 2px; }
    .particle:nth-child(3) { left: 40%; animation-delay: 2.5s; animation-duration: 6s; background: var(--purple); box-shadow: 0 0 6px var(--purple); }
    .particle:nth-child(4) { left: 55%; animation-delay: 0.8s; animation-duration: 8s; width: 4px; height: 4px; }
    .particle:nth-child(5) { left: 70%; animation-delay: 3.1s; animation-duration: 7.5s; background: var(--magenta); box-shadow: 0 0 6px var(--magenta); }
    .particle:nth-child(6) { left: 85%; animation-delay: 1.8s; animation-duration: 9.5s; width: 2px; height: 2px; }
    .particle:nth-child(7) { left: 50%; animation-delay: 4.2s; animation-duration: 6.5s; background: var(--purple); box-shadow: 0 0 6px var(--purple); }
    .particle:nth-child(8) { left: 15%; animation-delay: 5.0s; animation-duration: 8.2s; width: 3px; height: 3px; }
    .particle:nth-child(9) { left: 65%; animation-delay: 3.8s; animation-duration: 7.2s; }
    .particle:nth-child(10) { left: 35%; animation-delay: 6.0s; animation-duration: 8.8s; background: var(--magenta); box-shadow: 0 0 6px var(--magenta); }
    .particle:nth-child(11) { left: 5%; animation-delay: 0.5s; animation-duration: 9.2s; width: 2px; height: 2px; }
    .particle:nth-child(12) { left: 75%; animation-delay: 2.2s; animation-duration: 7.8s; background: var(--purple); box-shadow: 0 0 6px var(--purple); }
    .particle:nth-child(13) { left: 90%; animation-delay: 4.8s; animation-duration: 6.2s; }
    .particle:nth-child(14) { left: 30%; animation-delay: 5.5s; animation-duration: 8.5s; width: 3px; height: 3px; }
    .particle:nth-child(15) { left: 45%; animation-delay: 1.5s; animation-duration: 7.0s; background: var(--magenta); box-shadow: 0 0 6px var(--magenta); }

    @keyframes particle-float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      padding: 8px 18px;
      border-radius: 10px;
      background: var(--bg-card);
      backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      border: 1px solid var(--border-subtle);
      transition: all 0.3s ease;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .back::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--cyan), transparent, var(--purple));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }
    .back:hover {
      color: var(--text);
      border-color: transparent;
      box-shadow: var(--glow-cyan);
      transform: translateX(-2px);
    }
    .back:hover::before { opacity: 1; }

    .hero {
      text-align: center;
      padding: 32px 24px 28px;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
      border-radius: 2px;
    }

    .hero h1 {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--cyan), var(--purple), var(--magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .photo-grid {
      max-width: 800px;
      margin: 32px auto 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .photo-card {
      background: var(--bg-card);
      backdrop-filter: blur(16px) saturate(1.5);
      -webkit-backdrop-filter: blur(16px) saturate(1.5);
      border: 1px solid var(--border-subtle);
      border-radius: 18px;
      padding: 12px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .photo-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      padding: 1px;
      background: linear-gradient(135deg, transparent, rgba(0, 212, 255, 0.08), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .photo-card:hover {
      border-color: transparent;
      box-shadow: var(--glow-cyan), inset 0 0 40px rgba(0, 212, 255, 0.03);
      transform: translateY(-2px);
    }
    .photo-card:hover::before { opacity: 1; }

    .photo-card img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    .footer {
      text-align: center;
      padding: 32px 24px;
      margin-top: 48px;
      font-size: 12px;
      color: var(--text-faint);
      position: relative;
    }
    .footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
    }
    .footer strong { color: var(--text-dim); }

    @media (max-width: 640px) {
      .container { padding: 16px 16px 32px; }
      .hero { padding: 24px 16px 24px; }
      .hero h1 { font-size: 26px; }
      .photo-grid { gap: 20px; }
      .photo-card { padding: 8px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

<div class="container">

  <a class="back" href="index.html">← Назад</a>

  <div class="hero">
    <h1>Фото</h1>
    <div class="subtitle">Автоматическая публикация из телефона</div>
  </div>

  <div class="photo-grid">
    <div class="photo-card">
      <img src="img_0757.webp" alt="IMG_0757">
    </div>
    <div class="photo-card">
      <img src="img_0790.webp" alt="IMG_0790">
    </div>
    <div class="photo-card">
      <img src="img_0786.webp" alt="IMG_0786">
    </div>
  </div>

  <div class="footer">
    <strong>☽ ЛУНТ</strong> · nasledstvo2026.github.io · 2026
  </div>

</div>
</body>
</html>
