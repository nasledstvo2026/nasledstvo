<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI DJ — DJ Set'ы</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #070b12;
      color: #eaf0f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 24px;
    }
    .card {
      background: rgba(14,22,36,0.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(0,200,255,0.08);
      border-radius: 18px;
      padding: 40px 48px;
      max-width: 480px;
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg,#00d4ff,#a855f7,#f0f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { color: #8892a0; margin: 8px 0; font-size: 15px; line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 28px;
      background: linear-gradient(135deg,rgba(0,212,255,0.15),rgba(168,85,247,0.15));
      border: 1px solid rgba(0,200,255,0.1);
      border-radius: 12px;
      color: #00d4ff;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all .25s;
    }
    .btn:hover {
      border-color: transparent;
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
      color: #eaf0f6;
      transform: translateY(-1px);
    }
    .info { font-size: 13px; color: #4a5464; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎛 AI DJ</h1>
    <p>Страница управляется с сервера, а не из этого репозитория.</p>
    <a class="btn" href="http://176.123.162.12/aidj/">Перейти к DJ Set'ам →</a>
    <div class="info">Работает без HTTPS — открывай напрямую, никаких предупреждений.</div>
  </div>
</body>
</html>
