<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI DJ — плеер</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    .player-list { margin-top: 16px; }
    .track {
      background: rgba(22,27,34,0.8);
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .track-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 200px;
    }
    .track-num {
      background: rgba(88,166,255,0.15);
      color: #58a6ff;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85em;
      font-weight: 700;
      flex-shrink: 0;
    }
    .track-name {
      color: #f0f6fc;
      font-size: 0.95em;
      font-weight: 500;
      word-break: break-word;
    }
    .track-size {
      color: #8b949e;
      font-size: 0.8em;
      white-space: nowrap;
    }
    .track-player {
      flex-shrink: 0;
      width: 100%;
      max-width: 400px;
    }
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: #8b949e;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .count-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      color: #8b949e;
      font-size: 0.9em;
    }
    .count { color: #58a6ff; font-weight: 600; }
    .refresh-note {
      color: #484f58;
      font-size: 0.8em;
      margin-top: 8px;
      text-align: right;
    }
  </style>
</head>
<body>
<div class="container">

</html>
