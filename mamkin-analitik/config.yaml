# OpenClaw Configuration — Мамкин аналитик
# Версия: 1.0

project:
  name: "Мамкин аналитик"
  language: ru
  default_model: deepseek/deepseek-v4-flash

agents:
  - id: agent-questioner
    path: agents/questioner/index.js
    prompt: agents/questioner/prompt.md
    timeout_ms: 5000
    retry:
      max_attempts: 3
      backoff: exponential
      initial_delay_ms: 1000
      max_delay_ms: 10000

  - id: agent-compiler
    path: agents/compiler/index.js
    prompt: agents/compiler/prompt.md
    timeout_ms: 5000
    retry:
      max_attempts: 3
      backoff: exponential
      initial_delay_ms: 1000
      max_delay_ms: 10000

  - id: agent-controller
    path: agents/controller/index.js
    prompt: agents/controller/prompt.md
    timeout_ms: 5000
    retry:
      max_attempts: 3
      backoff: exponential
      initial_delay_ms: 1000
      max_delay_ms: 10000

  - id: agent-generator
    path: agents/generator/index.js
    prompt: agents/generator/prompt.md
    timeout_ms: 30000
    retry:
      max_attempts: 2
      backoff: exponential
      initial_delay_ms: 2000
      max_delay_ms: 15000

pipeline:
  order:
    - agent-questioner
    - agent-compiler
    - agent-controller
    - agent-generator
  max_iterations: 3  # Максимум возвратов от контролёра к опросчику

session:
  storage_path: ${SESSION_STORAGE_PATH:-/var/mamkin-analitik/sessions/}
  auto_save: true
  encryption: aes-256

generator:
  docx_timeout_ms: 30000
  github_pages_timeout_ms: 60000
  output_formats:
    - docx
    - html

telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  webhook_path: /webhook
  port: 8080
